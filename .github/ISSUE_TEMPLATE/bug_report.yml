name: Bug report
description: Report a bug in InkScroller Flutter
title: "fix(scope): short bug description"
labels: [bug]
assignees: [mfranchescagonzalezcejas]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below so the issue is actionable.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this on the current branch/build I tested
          required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug description
      description: What is broken?
      placeholder: The reader crashes when...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide numbered steps.
      placeholder: |
        1. Open...
        2. Tap...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - Auth
        - Library
        - Reader
        - Profile / Preferences
        - Navigation / Routing
        - Build / Flavors
        - Android Studio / Tooling
        - CI / Workflows
        - Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android emulator
        - Android device
        - iOS simulator
        - iOS device
        - Web
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste stack traces, error logs, or screenshots if available.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
