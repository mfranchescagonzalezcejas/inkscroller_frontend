name: CI

on:
  pull_request:
    branches:
      - develop
      - master
      - main
  push:
    branches:
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Analyze code
        run: fvm flutter analyze

  unit-tests:
    name: Unit tests (core + domain + data + providers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Run unit tests
        run: |
          fvm flutter test \
            test/core/ \
            test/features/library/domain/ \
            test/features/settings/domain/ \
            test/features/library/data/ \
            test/features/preferences/data/ \
            test/features/auth/presentation/auth_error_text_test.dart \
            test/features/auth/presentation/providers/ \
            test/features/home/presentation/providers/ \
            test/features/library/presentation/providers/ \
            test/features/preferences/presentation/providers/ \
            test/features/profile/presentation/providers/ \
            test/features/settings/presentation/providers/

  ui-smoke:
    name: UI smoke tests (routing + critical surfaces)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Run UI smoke tests
        run: |
          fvm flutter test \
            test/core/router/app_router_test.dart \
            test/core/router/app_routes_test.dart \
            test/features/library/presentation/pages/reader_page_test.dart \
            test/features/library/presentation/widgets/library_widgets_test.dart \
            test/features/settings/presentation/delete_account_dialog_test.dart

  ui-tests:
    name: UI tests (pages + widgets)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Run full UI tests
        run: |
          fvm flutter test \
            test/features/*/presentation/pages/ \
            test/features/*/presentation/widgets/

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Check for outdated dependencies
        run: |
          echo "## Outdated dependencies" >> "$GITHUB_STEP_SUMMARY"
          fvm dart pub outdated >> "$GITHUB_STEP_SUMMARY"
