name: CI

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Analyze code
        run: fvm flutter analyze

  unit-tests:
    name: Unit tests (core + domain + data + providers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Guard against focused Dart tests
        run: |
          if grep -RInE '(^|[^A-Za-z0-9_])solo_(test|group)[[:space:]]*\(' test --include='*_test.dart'; then
            echo "Focused Dart tests are not allowed in CI. Remove solo_test/solo_group before pushing."
            exit 1
          fi

      - name: Run unit tests
        run: |
          fvm flutter test \
            test/core/ \
            test/features/library/domain/ \
            test/features/settings/domain/ \
            test/features/auth/presentation/validation/ \
            test/features/library/data/ \
            test/features/preferences/data/ \
            test/features/profile/data/ \
            test/features/settings/data/ \
            test/features/auth/presentation/providers/ \
            test/features/home/presentation/providers/ \
            test/features/library/presentation/providers/ \
            test/features/preferences/presentation/providers/ \
            test/features/profile/presentation/providers/ \
            test/features/settings/presentation/providers/ \
            test/features/settings/presentation/settings_provider_test.dart \
            test/features/settings/presentation/delete_account_dialog_test.dart \
            test/e2e/helpers/cleanup_test.dart

  ui-smoke:
    name: UI smoke tests (routing + critical surfaces)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Run UI smoke tests
        run: |
          fvm flutter test \
            test/core/router/app_router_test.dart \
            test/core/router/app_routes_test.dart \
            test/features/auth/presentation/pages/register_page_test.dart \
            test/features/settings/presentation/pages/settings_page_test.dart \
            test/features/library/presentation/widgets/library_widgets_test.dart \
            test/features/home/presentation/pages/home_hero_overflow_test.dart

  ui-tests:
    name: UI tests (pages + widgets) — informational
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install project dependencies
        run: fvm flutter pub get

      - name: Run full UI tests
        run: |
          fvm flutter test \
            test/features/about/presentation/pages/about_page_test.dart \
            test/features/home/presentation/pages/home_new_chapters_section_test.dart \
            test/features/library/presentation/pages/library_page_test.dart \
            test/features/library/presentation/pages/reader_page_test.dart
