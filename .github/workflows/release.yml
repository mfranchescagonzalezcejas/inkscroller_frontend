name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Analyze
        run: fvm flutter analyze

      - name: Run tests
        run: fvm flutter test

      - name: Validate tag format
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          if ! echo "$TAG_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "[ERROR] Tag must follow numeric semver (e.g. v1.0.2)"
            exit 1
          fi
          echo "[OK] Tag v$TAG_VERSION is valid."

      - name: Validate tag points to main HEAD
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin main --quiet
          TAG_COMMIT=$(git rev-parse HEAD)
          MAIN_COMMIT=$(git rev-parse origin/main)
          if [ "$TAG_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "[ERROR] Tag $REF_NAME does not point to HEAD of main."
            exit 1
          fi
          echo "[OK] Tag points to HEAD of main ($MAIN_COMMIT)."

      - name: Write Firebase dart-defines
        run: |
          mkdir -p .dart-defines
          echo '${{ secrets.FIREBASE_DART_DEFINES_JSON }}' > .dart-defines/firebase.json

      - name: Generate release metadata
        id: release_meta
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          PREVIOUS_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          RANGE="$PREVIOUS_TAG..HEAD"
          [ -z "$PREVIOUS_TAG" ] && RANGE="HEAD"

          mkdir -p release-metadata

          ALL_COMMITS=$(git log "$RANGE" --pretty=format:"%s")

          # Count and clean by type
          FEATURES=$(printf '%s\n' "$ALL_COMMITS" | grep '^feat' || true)
          FIXES=$(printf '%s\n' "$ALL_COMMITS" | grep '^fix' || true)
          REFACTORS=$(printf '%s\n' "$ALL_COMMITS" | grep -E '^(refactor|perf)' || true)
          FEAT_COUNT=$(printf '%s\n' "$ALL_COMMITS" | grep -c '^feat' || true)
          FIX_COUNT=$(printf '%s\n' "$ALL_COMMITS" | grep -c '^fix' || true)
          REFACTOR_COUNT=$(printf '%s\n' "$ALL_COMMITS" | grep -cE '^(refactor|perf)' || true)

          # Strip conventional-commit prefix/scope so messages read naturally
          STRIP_PREFIX='s/^(feat|fix|refactor|perf)(\([^)]*\))?:[[:space:]]*/- /'

          # Full notes: Summary + Features + Bug Fixes + Refactors (same for all flavors)
          FULL_NOTES="release-metadata/release_notes.txt"
          {
            echo "**Summary**"
            echo "Release $TAG includes **$FEAT_COUNT features**, **$FIX_COUNT bug fixes** and **$REFACTOR_COUNT improvements** across the app."
            echo ""
            [ -z "$FEATURES" ] || { echo "**🚀 Features**"; printf '%s\n' "$FEATURES" | sed -E "$STRIP_PREFIX"; echo ""; }
            [ -z "$FIXES" ] || { echo "**🐛 Bug Fixes**"; printf '%s\n' "$FIXES" | sed -E "$STRIP_PREFIX"; echo ""; }
            [ -z "$REFACTORS" ] || { echo "**🔧 Refactors & Improvements**"; printf '%s\n' "$REFACTORS" | sed -E "$STRIP_PREFIX"; }
          } > "$FULL_NOTES"

          cp "$FULL_NOTES" release-metadata/release_notes_dev.txt
          cp "$FULL_NOTES" release-metadata/release_notes_staging.txt
          cp "$FULL_NOTES" release-metadata/release_notes_pro.txt

          DEFAULT_MESSAGE="- No user-visible changes"
          for f in dev staging pro; do
            if [ ! -s "release-metadata/release_notes_${f}.txt" ]; then
              echo "$DEFAULT_MESSAGE" > "release-metadata/release_notes_${f}.txt"
            fi
          done

      - name: Upload release metadata
        uses: actions/upload-artifact@v6
        with:
          name: release-metadata
          path: release-metadata/
          if-no-files-found: error

  build-apk:
    name: Build ${{ matrix.flavor }} APK
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: dev
            target: lib/main_dev.dart
            apk_name: app-dev-release.apk
          - flavor: staging
            target: lib/main_staging.dart
            apk_name: app-staging-release.apk
          - flavor: pro
            target: lib/main_pro.dart
            apk_name: app-pro-release.apk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          cache: true

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install FVM-pinned SDK
        run: fvm install

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Write Firebase dart-defines
        run: |
          mkdir -p .dart-defines
          echo '${{ secrets.FIREBASE_DART_DEFINES_JSON }}' > .dart-defines/firebase.json

      - name: Write Android signing config
        run: |
          mkdir -p android/app
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android/app/release-keystore.jks
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release-keystore.jks
          EOF

      - name: Resolve flavor configuration
        run: |
          case "${{ matrix.flavor }}" in
            dev)
              echo "API_BASE_URL=${{ secrets.API_BASE_URL_DEV }}" >> "$GITHUB_ENV"
              ;;
            staging)
              echo "API_BASE_URL=${{ secrets.API_BASE_URL_STAGING }}" >> "$GITHUB_ENV"
              ;;
            pro)
              echo "API_BASE_URL=${{ secrets.API_BASE_URL_PRO }}" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown flavor: ${{ matrix.flavor }}"
              exit 1
              ;;
          esac

      - name: Build ${{ matrix.flavor }} APK
        run: |
          fvm flutter build apk \
            --flavor "${{ matrix.flavor }}" \
            -t "${{ matrix.target }}" \
            --build-name="${GITHUB_REF_NAME#v}" \
            --build-number="$BUILD_NUMBER" \
            --dart-define="API_BASE_URL=$API_BASE_URL" \
            --dart-define-from-file=.dart-defines/firebase.json

      - name: Upload ${{ matrix.flavor }} APK
        uses: actions/upload-artifact@v6
        with:
          name: apk-${{ matrix.flavor }}
          path: build/app/outputs/flutter-apk/${{ matrix.apk_name }}
          if-no-files-found: error

      - name: Build ${{ matrix.flavor }} AAB
        if: matrix.flavor == 'pro'
        run: |
          fvm flutter build appbundle \
            --flavor "${{ matrix.flavor }}" \
            -t "${{ matrix.target }}" \
            --build-name="${GITHUB_REF_NAME#v}" \
            --build-number="$BUILD_NUMBER" \
            --dart-define="API_BASE_URL=$API_BASE_URL" \
            --dart-define-from-file=.dart-defines/firebase.json

      - name: Upload ${{ matrix.flavor }} AAB
        if: matrix.flavor == 'pro'
        uses: actions/upload-artifact@v6
        with:
          name: aab-${{ matrix.flavor }}
          path: build/app/outputs/bundle/${{ matrix.flavor }}Release/app-${{ matrix.flavor }}-release.aab
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs:
      - quality-gates
      - build-apk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: release-metadata

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          path: release-assets

      - name: Download AAB artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aab-*
          path: release-assets

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.quality-gates.outputs.tag }}
        run: |

          DEV_APK="release-assets/apk-dev/app-dev-release.apk"
          STAGING_APK="release-assets/apk-staging/app-staging-release.apk"
          PRO_APK="release-assets/apk-pro/app-pro-release.apk"
          PRO_AAB="release-assets/aab-pro/app-pro-release.aab"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "$DEV_APK" \
              "$STAGING_APK" \
              "$PRO_APK" \
              "$PRO_AAB" \
              --clobber
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes-file release-metadata/release_notes_dev.txt \
              "$DEV_APK" \
              "$STAGING_APK" \
              "$PRO_APK" \
              "$PRO_AAB"
          fi

  distribute:
    name: Distribute ${{ matrix.flavor }}
    needs:
      - quality-gates
      - build-apk
      - create-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: dev
            artifact_name: apk-dev
            apk_name: app-dev-release.apk
            release_notes: release_notes_dev.txt
          - flavor: staging
            artifact_name: apk-staging
            apk_name: app-staging-release.apk
            release_notes: release_notes_staging.txt
          - flavor: pro
            artifact_name: apk-pro
            apk_name: app-pro-release.apk
            release_notes: release_notes_pro.txt
    steps:
      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: release-metadata

      - name: Download ${{ matrix.flavor }} APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Resolve Firebase distribution configuration
        run: |
          case "${{ matrix.flavor }}" in
            dev)
              echo 'FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID_DEV }}' >> "$GITHUB_ENV"
              printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_DEV }}' > firebase-key.json
              ;;
            staging)
              echo 'FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID_STAGING }}' >> "$GITHUB_ENV"
              printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_STAGING }}' > firebase-key.json
              ;;
            pro)
              echo 'FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID_PRO }}' >> "$GITHUB_ENV"
              printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_PRO }}' > firebase-key.json
              ;;
            *)
              echo "Unknown flavor: ${{ matrix.flavor }}"
              exit 1
              ;;
          esac

      - name: Distribute ${{ matrix.flavor }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-key.json
        run: |
          firebase appdistribution:distribute \
            "dist/${{ matrix.apk_name }}" \
            --app "$FIREBASE_APP_ID" \
            --groups "testers" \
            --release-notes "$(cat release-metadata/${{ matrix.release_notes }})"

  sync-develop:
    name: Sync main → develop
    needs:
      - create-release
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch develop branch
        run: git fetch origin develop:develop 2>/dev/null || echo "develop branch not found, sync will be skipped"

      - name: Create sync PR
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          BEHIND=$(git rev-list --count develop..main 2>/dev/null || echo "0")
          if [ "$BEHIND" -gt 0 ]; then
            echo "main is $BEHIND commits ahead of develop. Creating sync PR..."
            gh pr create \
              --base develop \
              --head main \
              --title "chore: sync main → develop after ${REF_NAME}" \
              --body "Auto-generated sync PR after release \`${REF_NAME}\`." \
              --label "type:chore" || echo "⚠️ PR creation skipped (may already exist or branch protection)"
          else
            echo "develop is up to date with main. No sync needed."
          fi
