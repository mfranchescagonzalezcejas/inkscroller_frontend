name: inkscroller_flutter
description: "InkScroller Flutter application"
publish_to: 'none'

version: 1.0.1+31

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.5
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.4.0
  firebase_analytics: ^12.1.1
  firebase_auth: ^6.1.4
  firebase_core: ^4.3.0
  flutter_native_splash: ^2.4.7
  flutter_riverpod: ^2.6.1
  flutter_staggered_grid_view: ^0.7.0
  get_it: ^7.6.7
  go_router: ^14.8.1
  intl: ^0.20.2
  package_info_plus: ^8.3.1
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_test:
    sdk: flutter

  very_good_analysis: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/prod/foreground.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true

  # fallback (prod)
  image_path: "assets/icons/prod/foreground.png"

  adaptive_icon_foreground: "assets/icons/prod/foreground.png"
  adaptive_icon_background: "assets/icons/prod/background.png"

  flavors:
    dev:
      image_path: "assets/icons/dev/foreground.png"
      adaptive_icon_foreground: "assets/icons/dev/foreground.png"
      adaptive_icon_background: "assets/icons/dev/background.png"

    staging:
      image_path: "assets/icons/staging/foreground.png"
      adaptive_icon_foreground: "assets/icons/staging/foreground.png"
      adaptive_icon_background: "assets/icons/staging/background.png"

    pro:
      image_path: "assets/icons/prod/foreground.png"
      adaptive_icon_foreground: "assets/icons/prod/foreground.png"
      adaptive_icon_background: "assets/icons/prod/background.png"

flutter_native_splash:
  color: "#1C3C41" # fondo normal
  icon_background_color: "#1C3C41" # fondo de icono

  android: true
  ios: true

  android_12:
    color: "#1C3C41"
    icon_background_color: "#1C3C41"
